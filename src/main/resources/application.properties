# RevPay Application Configuration

# Server Configuration
server.port=8085
spring.application.name=revpay1

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revpay3
spring.datasource.username=root
spring.datasource.password=Tejas#123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT Configuration
jwt.secret=revpaySecretKeyForJWTTokenGenerationThatIsLongEnoughForSecurity
jwt.expiration=86400000

# Logging Configuration
logging.level.com.revpay=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} - %msg%n

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
